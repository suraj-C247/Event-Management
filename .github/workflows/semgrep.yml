name: Semgrep Scan on PR

on: 
  pull_request: # Runs Semgrep when a PR is created
  push: # Runs Semgrep on push (optional)

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/security-audit"  # Uses built-in security rules

